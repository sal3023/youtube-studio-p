name: Generate YouTube Thumbnails

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 2' # Every Tuesday at 00:00 UTC

jobs:
  generate_thumbnail_ideas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate Thumbnail Concepts
        run: python scripts/generate_thumbnail.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add content/thumbnails/*.md
          git commit -m "feat: Auto-generated thumbnail concepts"
          git push
