<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tosh5 Dashboard AI + GitHub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { font-family:'Cairo',sans-serif; background:#010409; color:#f0f6fc; margin:0; overflow-x:hidden; }
.glass { background: rgba(13,17,23,0.8); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:20px; }
.btn-primary { background: linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%); transition:0.2s; cursor:pointer; }
.btn-primary:active { transform:scale(0.95); }
textarea { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="flex flex-col min-h-screen">

<header class="h-16 glass flex items-center justify-between px-4">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">T5</div>
    <div class="text-[10px] font-bold text-emerald-400 flex items-center gap-1.5">
      <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div> متصل
    </div>
  </div>
</header>

<main class="flex-1 overflow-y-auto p-4">
<div class="max-w-4xl mx-auto space-y-6">

<!-- صانع المحتوى -->
<div class="glass p-5 space-y-4">
<h2 class="text-xl font-black mb-4 text-blue-400 flex items-center gap-2"><i data-lucide="pen-tool"></i> صانع المحتوى</h2>
<input type="text" id="topic-input" placeholder="اكتب عنوان المقال هنا..." class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-white outline-none mb-4">
<button id="btn-generate" class="btn-primary w-full py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2">توليد مقال HTML</button>
<textarea id="ai-code" class="w-full h-48 bg-black/40 border border-white/5 rounded-xl p-3 text-xs text-amber-400 outline-none" placeholder="سيظهر الكود هنا..." dir="ltr"></textarea>
</div>

<!-- إعدادات المفاتيح -->
<div class="glass p-5 space-y-4">
<h2 class="text-xl font-black text-white flex items-center gap-2 border-b border-white/5 pb-4"><i data-lucide="settings"></i> إعدادات المفاتيح</h2>
<input type="text" id="gemini-key" placeholder="Gemini API Key" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<input type="text" id="blog-id" placeholder="Blogger Blog ID" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<input type="text" id="blogger-token" placeholder="Blogger OAuth2 Token" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<input type="text" id="google-key" placeholder="Google Indexing API Key" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<input type="text" id="github-token" placeholder="GitHub Personal Access Token" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<button id="save-keys" class="w-full bg-blue-600 py-3 rounded-xl text-white font-bold">حفظ المفاتيح</button>
</div>

<!-- رفع الملفات إلى GitHub -->
<div class="glass p-5 space-y-4">
<h2 class="text-xl font-black text-yellow-400 flex items-center gap-2 border-b border-white/5 pb-4"><i data-lucide="upload-cloud"></i> رفع الملفات إلى GitHub</h2>
<input type="text" id="repo-name" placeholder="اسم المستودع" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<textarea id="file-content" placeholder="ضع محتوى الملف هنا..." class="w-full h-32 bg-black/40 border border-white/5 rounded-xl p-3 text-xs text-amber-400 outline-none"></textarea>
<input type="text" id="file-path" placeholder="مسار الملف في المستودع (example.txt)" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
<button id="upload-github" class="w-full bg-green-600 py-3 rounded-xl text-white font-bold">رفع الملف إلى GitHub</button>
</div>

</div>
</main>

<script src="./app.js"></script>
<script>lucide.replace();</script>
</body>
</html>
