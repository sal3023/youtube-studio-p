<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tosh5 Enterprise | Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #010409; color: #f0f6fc; overflow-x: hidden; margin: 0; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .nav-item { transition: all 0.3s; border-radius: 16px; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-right: 4px solid #3b82f6; }
        
        /* Mobile Bottom Nav Active State */
        .mobile-nav.active { color: #60a5fa; transform: translateY(-2px); }
        .mobile-nav.active::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #3b82f6; border-radius: 10px; }
        
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="h-16 glass !rounded-none border-b border-white/5 flex items-center justify-between px-4 lg:px-8 shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">T5</div>
            <div class="text-[10px] font-bold text-emerald-400 flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></div> متصل
            </div>
        </div>
        <button onclick="window.open('https://indexing-api-bulk-tool.vercel.app/', '_blank')" class="btn-primary px-4 py-1.5 rounded-lg text-[11px] font-bold flex items-center gap-1.5">
            <i data-lucide="zap" class="w-3.5 h-3.5"></i> أرشفة
        </button>
    </header>

    <main class="flex-1 overflow-y-auto pb-24 p-4 lg:p-8" id="main-scroll">
        <div class="max-w-4xl mx-auto">

            <section id="tab-writer" class="tab-content space-y-4">
                <div class="glass p-5 lg:p-8">
                    <h2 class="text-xl lg:text-2xl font-black mb-4 text-blue-400 flex items-center gap-2"><i data-lucide="pen-tool"></i> صانع المحتوى</h2>
                    <input type="text" id="topic-input" placeholder="اكتب عنوان المقال هنا..." class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-blue-500 mb-4">
                    <button id="btn-generate" onclick="generateRealContent()" class="btn-primary w-full py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2">
                        <span id="txt-generate">توليد مقال احترافي HTML</span>
                    </button>
                </div>
                
                <div class="glass p-4">
                    <label class="text-xs text-slate-400 font-bold mb-2 block">كود المقال الجاهز:</label>
                    <textarea id="ai-code" class="w-full h-48 bg-black/40 border border-white/5 rounded-xl p-3 font-mono text-xs text-amber-400 outline-none" placeholder="سيظهر الكود هنا..." dir="ltr"></textarea>
                </div>

                <button onclick="sendToBlogger()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2 shadow-lg">
                    <i data-lucide="send" class="w-4 h-4"></i> إرسال المقال إلى بلوجر
                </button>
            </section>

            <section id="tab-marketing" class="tab-content hidden space-y-4">
                <div class="glass p-5 lg:p-8">
                    <h2 class="text-xl font-black mb-4 text-violet-400 flex items-center gap-2"><i data-lucide="target"></i> خطة زيادة الأرباح</h2>
                    <button id="btn-market" onclick="generateMarketing()" class="w-full py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2 bg-gradient-to-r from-violet-600 to-indigo-600">
                        <span id="txt-market">توليد استراتيجية CPC الآن</span>
                    </button>
                </div>
                <div id="marketing-result" class="glass p-5 min-h-[200px] text-sm text-slate-300 leading-relaxed">
                    اضغط على الزر بالأعلى لتوليد الخطة...
                </div>
            </section>

            <section id="tab-audit" class="tab-content hidden space-y-4">
                <div class="glass p-5 lg:p-8">
                    <h2 class="text-xl font-black mb-4 text-rose-400 flex items-center gap-2"><i data-lucide="activity"></i> فحص سرعة جوجل</h2>
                    <input type="url" id="blog-url" placeholder="https://www.yourblog.com" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-rose-500 mb-4" dir="ltr">
                    <button id="btn-audit" onclick="runRealAudit()" class="bg-rose-600 w-full py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2 mb-6">
                        <span id="txt-audit">بدء الفحص الحقيقي</span>
                    </button>
                    
                    <div class="grid grid-cols-2 gap-3" id="audit-results" style="display: none;">
                        <div class="bg-black/40 p-4 rounded-xl text-center border border-emerald-500/20">
                            <div class="text-2xl font-black text-emerald-400" id="score-seo">0</div>
                            <div class="text-[10px] text-slate-400 mt-1">SEO</div>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl text-center border border-blue-500/20">
                            <div class="text-2xl font-black text-blue-400" id="score-perf">0</div>
                            <div class="text-[10px] text-slate-400 mt-1">السرعة</div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="tab-settings" class="tab-content hidden space-y-4">
                <div class="glass p-5 lg:p-8 space-y-5">
                    <h2 class="text-xl font-black text-white flex items-center gap-2 border-b border-white/5 pb-4"><i data-lucide="settings"></i> الإعدادات والمفاتيح</h2>
                    
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">1. مفتاح Gemini API</label>
                        <input type="password" id="key-gemini" placeholder="AIzaSy..." class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-blue-500" dir="ltr">
                        <p class="text-[10px] text-slate-500 mt-1">مطلوب لتشغيل المحرر والمسوق.</p>
                    </div>
                    
                    <div>
                        <label class="text-xs font-bold text-slate-400 mb-2 block">2. إيميل النشر السري (Blogger)</label>
                        <input type="email" id="key-mail" value="opnseeamo.opnseeamo@blogger.com" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm text-blue-400 outline-none font-mono" dir="ltr">
                    </div>

                    <button onclick="saveSettings()" class="btn-primary w-full py-4 rounded-xl font-bold text-sm mt-4 shadow-lg">حفظ الإعدادات</button>
                </div>
            </section>

        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full glass !rounded-none border-t border-white/5 bg-[#0d1117]/95 backdrop-blur-xl z-[100] flex justify-around items-center p-3 pb-safe">
        <button onclick="switchTab('writer', this)" class="mobile-nav active relative flex flex-col items-center gap-1 text-slate-500 w-16 transition-all">
            <i data-lucide="pen-tool" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">محتوى</span>
        </button>
        <button onclick="switchTab('marketing', this)" class="mobile-nav relative flex flex-col items-center gap-1 text-slate-500 w-16 transition-all">
            <i data-lucide="target" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">تسويق</span>
        </button>
        <button onclick="switchTab('audit', this)" class="mobile-nav relative flex flex-col items-center gap-1 text-slate-500 w-16 transition-all">
            <i data-lucide="activity" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">فحص</span>
        </button>
        <button onclick="switchTab('settings', this)" class="mobile-nav relative flex flex-col items-center gap-1 text-slate-500 w-16 transition-all">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span class="text-[9px] font-bold">إعدادات</span>
        </button>
    </nav>

    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-[200] flex flex-col gap-2 pointer-events-none"></div>

    <script>
        lucide.createIcons();

        // Load Settings on Start
        window.onload = () => {
            const keys = JSON.parse(localStorage.getItem('tosh5_v3_keys') || '{}');
            if(keys.gemini) document.getElementById('key-gemini').value = keys.gemini;
            if(keys.mail) document.getElementById('key-mail').value = keys.mail;
            if(keys.url) document.getElementById('blog-url').value = keys.url;
        };

        // Switch Tabs (Works for Mobile Nav)
        function switchTab(tabId, btnElement = null) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            // Show selected tab
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            
            // Update Mobile Nav styling
            if(btnElement) {
                document.querySelectorAll('.mobile-nav').forEach(el => el.classList.remove('active', 'text-blue-400'));
                btnElement.classList.add('active', 'text-blue-400');
            } else {
                // If called without element (e.g. from code), update the right icon manually
                document.querySelectorAll('.mobile-nav').forEach(el => el.classList.remove('active', 'text-blue-400'));
                document.querySelectorAll('.mobile-nav')[['writer','marketing','audit','settings'].indexOf(tabId)].classList.add('active', 'text-blue-400');
            }
            // Scroll to top
            document.getElementById('main-scroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show Notifications
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `glass p-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm bg-[#0d1117] transition-all transform duration-300 ${isError ? 'border-rose-500/50 text-rose-400' : 'border-emerald-500/50 text-emerald-400'}`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="w-5 h-5 shrink-0"></i> <span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // Save Settings
        function saveSettings() {
            const keys = {
                gemini: document.getElementById('key-gemini').value.trim(),
                mail: document.getElementById('key-mail').value.trim(),
                url: document.getElementById('blog-url').value.trim()
            };
            localStorage.setItem('tosh5_v3_keys', JSON.stringify(keys));
            showToast('تم حفظ الإعدادات بأمان!');
        }

        // REAL GEMINI API CALL (Updated to stable 1.5-flash)
        async function fetchGemini(prompt, systemMsg) {
            const apiKey = document.getElementById('key-gemini').value.trim();
            if(!apiKey) throw new Error("يرجى الذهاب للإعدادات ووضع مفتاح Gemini أولاً.");

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemMsg }] }
                })
            });
            
            if(!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "مفتاح API غير صحيح أو انتهت الحصة.");
            }
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        // Feature 1: AI Writer
        async function generateRealContent() {
            const topic = document.getElementById('topic-input').value;
            if(!topic) return showToast("أدخل عنوان المقال أولاً", true);

            const btn = document.getElementById('btn-generate');
            const txt = document.getElementById('txt-generate');
            btn.classList.add('btn-disabled');
            txt.innerHTML = '<div class="loader"></div> جارٍ الكتابة...';

            try {
                const result = await fetchGemini(
                    `اكتب مقال حصري بصيغة HTML عن: "${topic}". استخدم وسوم <h2> و <h3>. لا تكتب أي مقدمات، فقط كود الـ HTML الداخلي.`,
                    "أنت خبير سيو ومطور ويب محترف."
                );
                const cleanHTML = result.replace(/```html|```/g, '').trim();
                document.getElementById('ai-code').value = cleanHTML;
                showToast("تم توليد المقال بنجاح!");
            } catch (error) {
                showToast(error.message, true);
            } finally {
                btn.classList.remove('btn-disabled');
                txt.innerHTML = 'توليد مقال احترافي HTML';
            }
        }

        // Feature 2: Send to Blogger
        function sendToBlogger() {
            const content = document.getElementById('ai-code').value;
            const mail = document.getElementById('key-mail').value;
            const topic = document.getElementById('topic-input').value;
            
            if(!content) return showToast("قم بتوليد مقال أولاً!", true);
            
            navigator.clipboard.writeText(content);
            showToast("تم نسخ الكود! سيفتح الإيميل الآن للصق الكود.");
            
            setTimeout(() => {
                const subject = encodeURIComponent(topic || "مقال جديد");
                window.location.href = `mailto:${mail}?subject=${subject}&body=الرجاء لصق الكود المنسوخ هنا..`;
            }, 1500);
        }

        // Feature 3: Marketing
        async function generateMarketing() {
            const btn = document.getElementById('btn-market');
            const txt = document.getElementById('txt-market');
            const resultBox = document.getElementById('marketing-result');
            
            btn.classList.add('btn-disabled');
            txt.innerHTML = '<div class="loader"></div> جارٍ التحليل...';
            
            try {
                const result = await fetchGemini(
                    "أعطني خطة عملية من 3 خطوات سريعة لرفع أرباح جوجل أدسنس للمدونات. استخدم تنسيق بسيط وواضح.",
                    "أنت خبير تسويق رقمي."
                );
                resultBox.innerHTML = result.replace(/\n/g, '<br>');
                showToast("تم رسم الخطة!");
            } catch (error) {
                showToast(error.message, true);
            } finally {
                btn.classList.remove('btn-disabled');
                txt.innerHTML = 'توليد استراتيجية CPC الآن';
            }
        }

        // Feature 4: REAL PageSpeed Audit
        async function runRealAudit() {
            const url = document.getElementById('blog-url').value;
            if(!url || !url.startsWith('http')) return showToast("أدخل رابط صحيح يبدأ بـ https", true);

            const btn = document.getElementById('btn-audit');
            const txt = document.getElementById('txt-audit');
            const resultsDiv = document.getElementById('audit-results');
            
            btn.classList.add('btn-disabled');
            txt.innerHTML = '<div class="loader"></div> جارٍ فحص خوادم جوجل...';
            resultsDiv.style.display = 'none';

            try {
                const apiURL = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodeURIComponent(url)}&category=SEO&category=PERFORMANCE`;
                const response = await fetch(apiURL);
                const data = await response.json();

                if(data.error) throw new Error("فشل الفحص.");

                const seoScore = Math.round(data.lighthouseResult.categories.seo.score * 100);
                const perfScore = Math.round(data.lighthouseResult.categories.performance.score * 100);

                document.getElementById('score-seo').innerText = seoScore + "%";
                document.getElementById('score-perf').innerText = perfScore + "%";
                
                resultsDiv.style.display = 'grid';
                showToast("تم جلب البيانات الحقيقية من جوجل!");
                saveSettings();
            } catch (error) {
                showToast("حدث خطأ أثناء الفحص. تأكد من الرابط.", true);
            } finally {
                btn.classList.remove('btn-disabled');
                txt.innerHTML = 'بدء الفحص الحقيقي';
            }
        }
    </script>
</body>
</html>
