<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>🤖 AI Agent Studio Pro | Automated Workspace</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Basic Reset and Layout */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* خلفية متدرجة جميلة */
      min-height: 100vh; padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Container with Glassmorphism Effect */
    .container { 
      max-width: 900px; width: 100%; margin: 0 auto; 
      background: rgba(255, 255, 255, 0.95); /* شبه شفاف */
      backdrop-filter: blur(10px); /* تأثير البلور */
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px; padding: 40px; 
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    /* Headers */
    h1 { 
      text-align: center; 
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
      font-size: 2.5em; 
      margin-bottom: 15px;
    }
    /* Inputs and Buttons */
    input[type="text"] { 
      width: 100%; padding: 18px; border: none; 
      border-radius: 16px; font-size: 16px; margin: 20px 0; 
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { outline: none; border-color: #667eea; }
    button { 
      width: 100%; padding: 18px; 
      background: linear-gradient(45deg, #ff6b6b, #feca57); 
      border: none; border-radius: 50px; color: white; 
      font-size: 18px; font-weight: 600; cursor: pointer; 
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,107,107,0.5); }
    
    /* Output Area */
    #output { 
      background: #1e1e1e; color: #00ff88; padding: 24px; 
      border-radius: 16px; min-height: 200px; margin-top: 20px; 
      font-family: monospace; font-size: 14px; overflow-x: auto;
    }
    .status { 
      padding: 12px 20px; background: rgba(255,255,255,0.2); border-radius: 12px; 
      margin: 20px 0; text-align: center; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 AI Agent Studio Pro</h1>
    <div class="status">حالة الوكيل: <span id="status">جاهز للعمل</span></div>
    
    <input type="text" id="command" placeholder="اكتب الأمر: اصنع محتوى، اختبر موقع، انشر كود...">
    <button onclick="runAgent()">🔥 نفّذ الوكيل الآن</button>
    
    <div id="output">النتائج والمخرجات ستظهر هنا...</div>
  </div>

  <script>
    async function runAgent(){
      const command = document.getElementById('command').value;
      if (!command) {
        document.getElementById('output').textContent = "الرجاء إدخال أمر للوكيل!";
        return;
      }
      
      document.getElementById('status').textContent = 'يعمل...';
      document.getElementById('output').textContent = `جاري تنفيذ الأمر: "${command}"`;
      
      try {
        const res = await fetch('/api/agent', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({command: command})
        });
        
        const data = await res.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        
      } catch(error) {
        document.getElementById('output').textContent = "❌ فشل الاتصال بالـ Agent API: " + error.message;
      } finally {
        document.getElementById('status').textContent = 'انتهى ✅';
      }
    }
  </script>
</body>
</html>
