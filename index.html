<!DOCTYPE html>
<html dir="rtl">
<head>
  <title>🚀 AI Agent Studio Pro | Smart Workspace</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset and layout */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Glassmorphism container */
    .container { 
      max-width: 900px; width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 24px; padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }

    h1 { 
      text-align: center;
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%; padding: 18px; border: none; border-radius: 16px;
      font-size: 16px; margin: 20px 0;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { outline: none; border-color: #667eea; }

    button {
      width: 100%; padding: 18px;
      background: linear-gradient(45deg, #ff6b6b, #feca57);
      border: none; border-radius: 50px; color: white;
      font-size: 18px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,107,107,0.5); }

    #output {
      background: #1e1e1e; color: #00ff88; padding: 24px;
      border-radius: 16px; min-height: 200px; margin-top: 20px;
      font-family: monospace; font-size: 14px; overflow-x: auto;
      white-space: pre-wrap; /* عرض متعدد الأسطر */
    }

    .status {
      padding: 12px 20px; background: rgba(255,255,255,0.2); border-radius: 12px;
      margin: 20px 0; text-align: center; font-weight: 600;
    }

    .log-success { color: #22c55e; }
    .log-error { color: #ff4d4d; }
    .log-info { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 AI Agent Studio Pro</h1>
    <div class="status">حالة الوكيل: <span id="status">جاهز للعمل ✅</span></div>

    <input type="text" id="command" placeholder="اكتب الأمر: اصنع محتوى، اختبر موقع، انشر كود...">
    <button onclick="runAgent()">🔥 نفّذ الوكيل الآن</button>

    <div id="output">النتائج والمخرجات ستظهر هنا...</div>
  </div>

  <script>
    async function runAgent(){
      const command = document.getElementById('command').value.trim();
      const output = document.getElementById('output');
      const status = document.getElementById('status');

      if (!command) {
        output.textContent = "⚠️ الرجاء إدخال أمر للوكيل!";
        return;
      }

      status.textContent = 'يعمل... ⏳';
      output.innerHTML = `<span class="log-info">جاري تنفيذ الأمر: "${command}"</span>\n`;

      try {
        // محاكاة الذكاء الاصطناعي المحلي للتجربة
        await new Promise(r => setTimeout(r, 1000)); // انتظار وهمي

        let result;
        switch(true) {
          case command.toLowerCase().includes('اصنع محتوى'):
            result = "✅ تم إنشاء محتوى تجريبي: [هذا نص مولد بواسطة الوكيل الذكي]";
            break;
          case command.toLowerCase().includes('اختبر موقع'):
            result = "✅ نتائج اختبار الموقع: جميع الروابط صالحة، الأداء ممتاز.";
            break;
          case command.toLowerCase().includes('انشر كود'):
            result = "✅ الكود تم نشره بنجاح في المستودع التجريبي.";
            break;
          default:
            result = `⚠️ لم يتم التعرف على الأمر: "${command}"`;
        }

        output.innerHTML += `<span class="log-success">${result}</span>`;

      } catch(err) {
        output.innerHTML += `<span class="log-error">❌ حدث خطأ أثناء تنفيذ الوكيل: ${err.message}</span>`;
      } finally {
        status.textContent = 'جاهز للعمل ✅';
      }
    }
  </script>
</body>
</html>
