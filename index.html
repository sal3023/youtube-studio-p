<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tosh5 AI Writer</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{font-family:'Cairo',sans-serif;background:#0d1117;color:#fff}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.08)}
.loader{border:3px solid rgba(255,255,255,0.2);border-top:3px solid #3b82f6;border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:10px;display:none}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-3xl space-y-6">

<div class="glass p-6 rounded-2xl">
<h1 class="text-2xl font-black text-blue-400 mb-4">🔥 Tosh5 AI Article Generator</h1>

<input id="apiKey" type="password" placeholder="ضع مفتاح Gemini API هنا"
class="w-full mb-4 p-3 rounded-xl bg-black/50 border border-white/10 outline-none">

<input id="topic" type="text" placeholder="اكتب عنوان المقال..."
class="w-full mb-4 p-4 rounded-xl bg-black/50 border border-white/10 outline-none">

<button onclick="generateArticle()" id="generateBtn"
class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold flex justify-center items-center gap-2">
<span id="btnText">توليد مقال احترافي</span>
</button>
</div>

<div class="glass p-4 rounded-2xl">
<label class="text-xs text-gray-400 block mb-2">نتيجة HTML:</label>
<textarea id="result" class="w-full h-64 p-3 bg-black/40 rounded-xl text-sm outline-none" dir="ltr"></textarea>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
function showToast(msg){
const toast=document.getElementById("toast")
toast.innerText=msg
toast.style.display="block"
setTimeout(()=>toast.style.display="none",3000)
}

async function generateArticle(){
const apiKey=document.getElementById("apiKey").value.trim()
const topic=document.getElementById("topic").value.trim()
const btn=document.getElementById("generateBtn")
const btnText=document.getElementById("btnText")
const result=document.getElementById("result")

if(!apiKey){showToast("أدخل مفتاح API");return}
if(!topic){showToast("أدخل عنوان المقال");return}

btn.disabled=true
btnText.innerHTML='<div class="loader"></div> جاري التوليد...'

try{
const response=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{
role:"user",
parts:[{text:`اكتب مقال HTML احترافي متوافق SEO عن ${topic} يحتوي على h1 h2 h3 وفقرات وقائمة ونهاية.`}]
}]
})
}
)

const data=await response.json()

if(data.candidates){
result.value=data.candidates[0].content.parts[0].text
showToast("تم إنشاء المقال بنجاح 🔥")
}else{
console.log(data)
showToast("حدث خطأ - تحقق من المفتاح")
}

}catch(err){
console.log(err)
showToast("خطأ في الاتصال")
}

btn.disabled=false
btnText.innerText="توليد مقال احترافي"
}
</script>

</body>
</html>
