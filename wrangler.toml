name = "tosh5-ai-engine"
main = "src/index.js"
compatibility_date = "2024-02-23"
compatibility_flags = ["nodejs_compat"]

# ==================== Triggers - Cron Jobs ====================
# تشغيل الأتمتة الذكية كل ساعة بشكل منتظم
[triggers]
crons = ["0 * * * *"]

# ==================== Environment Variables ====================
[vars]
BLOG_URL = "https://www.tosh5.shop"
ENVIRONMENT = "production"
LOG_LEVEL = "info"

# ملاحظة: يجب إضافة INDEXNOW_KEY و OPENAI_API_KEY عبر لوحة تحكم Cloudflare للأمان

# ==================== Build Configuration ====================
[build]
command = "npm install"
cwd = "./"

# ==================== Observability ====================
[observability]
enabled = true
