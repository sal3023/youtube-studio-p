name = "tosh5-automation"
main = "src/index.js"
compatibility_date = "2024-02-23"
compatibility_flags = ["nodejs_compat"]

# ==================== Routes ====================
routes = [
  { pattern = "youtube-studio-p.pages.dev/*", zone_name = "pages.dev" }
]

# ==================== Triggers - Cron Jobs ====================
[triggers]
# تشغيل الأتمتة كل ساعة
crons = ["0 * * * *"]

# ==================== Environment Variables ====================
[env.production]
name = "tosh5-automation-prod"
main = "src/index.js"

[env.production.vars]
BLOG_URL = "https://www.tosh5.shop"
ENVIRONMENT = "production"
LOG_LEVEL = "info"

[env.production.triggers]
crons = ["0 * * * *"]

# ==================== KV Namespaces (Optional) ====================
# [[kv_namespaces]]
# binding = "STATS_KV"
# id = "your_kv_namespace_id"
# preview_id = "your_preview_kv_namespace_id"

# [[env.production.kv_namespaces]]
# binding = "STATS_KV"
# id = "your_production_kv_namespace_id"

# ==================== Build Configuration ====================
[build]
command = "npm install"
cwd = "./"

# ==================== Observability ====================
[observability]
enabled = true

# ==================== Limits ====================
[limits]
cpu_ms = 50000
